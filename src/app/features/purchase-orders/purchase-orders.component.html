<div class="glass-card">

  <h2>Purchase Orders</h2>

  <button mat-raised-button color="primary"
        (click)="openCreateDialog()">
    Create PO
  </button>
  <div *ngIf="loading" class="spinner">
    <mat-spinner diameter="40"></mat-spinner>
  </div>
  <table mat-table [dataSource]="dataSource" matSort>

    <ng-container matColumnDef="poNumber">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>PO Number</th>
      <td mat-cell *matCellDef="let row">{{ row.poNumber }}</td>
    </ng-container>

    <ng-container matColumnDef="vendorName">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Vendor</th>
      <td mat-cell *matCellDef="let row">{{ row.vendorName }}</td>
    </ng-container>

    <ng-container matColumnDef="totalAmount">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Total</th>
      <td mat-cell *matCellDef="let row">₹ {{ row.totalAmount }}</td>
    </ng-container>

    <!-- <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let row">
        <span class="status-badge"
          [ngClass]="'status-' + row.status.toLowerCase()">
          {{ row.status }}
        </span>
      </td>
    </ng-container> -->

    <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Status</th>
    <td mat-cell *matCellDef="let po">
      <span class="status-badge"
            [ngClass]="getStatusClass(po)">

        {{ getStatusText(po) }}

      </span>

    </td>
    </ng-container>

  
    <!--Action -->
   <ng-container matColumnDef="action">

    <th mat-header-cell *matHeaderCellDef>Action</th>

    <td mat-cell *matCellDef="let po">
      <!-- {{ role }} -->
    @if(canApprove(po)){
      <button mat-raised-button
      color="primary"
      (click)="approve(po,'Approved')">

      Approve

      </button>

      <button mat-raised-button
      color="warn"
      (click)="approve(po,'Rejected')">
      Reject
      </button>
    }

    </td>

    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>

  <mat-paginator [pageSize]="7"></mat-paginator>

</div>
