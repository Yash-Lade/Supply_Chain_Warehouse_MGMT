<div class="glass-card">

  <h2>Inventory Overview</h2>

  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Search Item</mat-label>
    <input matInput (keyup)="applyFilter($event)">
  </mat-form-field>

  <div *ngIf="loading" class="spinner">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <table mat-table [dataSource]="dataSource" matSort *ngIf="!loading">

    <ng-container matColumnDef="itemName">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Item</th>
      <td mat-cell *matCellDef="let row">{{ row.itemName }}</td>
    </ng-container>

    <ng-container matColumnDef="warehouseName">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Warehouse</th>
      <td mat-cell *matCellDef="let row">{{ row.warehouseName }}</td>
    </ng-container>

    <ng-container matColumnDef="currentStock">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>Current Stock</th>
      <td mat-cell *matCellDef="let row">{{ row.currentStock }}</td>
    </ng-container>

    <ng-container matColumnDef="rol">
      <th mat-header-cell *matHeaderCellDef mat-sort-header>ROL</th>
      <td mat-cell *matCellDef="let row">{{ row.rol }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let row">

        <span class="status-badge"
              [ngClass]="{
                'status-approved': getStockStatus(row) === 'Healthy',
                'status-pending': getStockStatus(row) === 'Low',
                'status-rejected': getStockStatus(row) === 'Critical'
              }">
          {{ getStockStatus(row) }}
        </span>

      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

  </table>

  <mat-paginator [pageSize]="5"></mat-paginator>

</div>
