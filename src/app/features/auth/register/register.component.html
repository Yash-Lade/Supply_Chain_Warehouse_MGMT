<div class="register-wrapper">

  <div class="register-card">

    <div class="logo">
      <div class="circle"></div>
      <h2>Supply Chain & Warehouse Management System</h2>
      <p>Create Account</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="register()">

      <div class="input-group">
        <input type="text" placeholder="FullName" formControlName="FullName">
      </div>

      <div class="input-group">
        <input type="email" placeholder="Email" formControlName="Email">
      </div>

      <div class="input-group">
        <select formControlName="RoleId">
          <option [value]="2">HOD</option>
          <option [value]="3">Finance Manager</option>
          <option [value]="4">Medical Director</option>
        </select>
      </div>
      <div class="input-group">
        <input type="password" placeholder="Password" formControlName="Password">
      </div>

      <div class="input-group">
        <input type="password" placeholder="CONFIRM PASSWORD" formControlName="confirmPassword">
      </div>

      <button type="submit" class="neon-btn">
        CREATE ACCOUNT →
      </button>

    </form>

    <div class="footer-text">
      Already registered?
      <a routerLink="/login">Login</a>
    </div>

  </div>

</div>
